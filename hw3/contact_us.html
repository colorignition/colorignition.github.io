<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ABC Toys - Contact Us</title>
  <meta name="description" content="ABC Toys with great toys for all age groups">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="styles.css" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
  <!-- Nav -->
  <script id="navbar" src="nav.js"></script>

  <br>

  <!-- Content -->
  <div class="container p-5">
    <header>
      <h1>ABC Toys</h1>
      <h3>Making learning fun</h3>
    </header>

    <hr class="my-3">
    <br>

    <div>
      <h2>Contact Us</h2>

      <h3>Links</h3>
      <ul>
        <li>Email: <a href="mailto:info@abctoys.com">info@abctoys.com</a></li>
        <li>Phone: <tel href="+18009606703">+1 (800) 960-6703</tel></li>
        <li>Address:<br><a href="https:www.google.com/maps" target="_blank">430 Fairview Banks<br>Oak Valley, CT 06167</a></li>
        <li>Facebook: <a href="https://www.facebook.com" target="_blank">Link to Facebook Page</a></li>
      </ul>

      <br>

      <h3>Comments Form</h3>
      <form role="form">
        <div class="form-group">
          <label for="name" class="form-label">Name</label>
          <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name">
        </div>

        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="text" class="form-control" id="email" name="email" placeholder="Enter your email address">
        </div>

        <div class="form-group">
          <label for="comment" class="form-label">Comments</label>
          <textarea class="form-control" id="comment" label="comment" placeholder="Enter comments here" rows="4"></textarea>
        </div>

        <br>
    
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>
    </div>
    
  </div>
</body>

</html>
