<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ABC Toys - Products</title>
  <meta name="description" content="ABC Toys with great toys for all age groups">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="styles.css" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
  <!-- Nav -->
  <script id="navbar" src="nav.js"></script>

  <br>

  <!-- Content -->
  <div class="container p-5">
    <header>
      <h1>ABC Toys</h1>
      <h3>Making learning fun</h3>
    </header>

    <hr class="my-3">
    <br>

    <div>
      <h2>Products</h2>

      <h3>Product List</h3>
      <div class="accordion" id="accordion_products">

        <!-- Panel Item 1-->
        <div class="accordion-item">

          <h4 id="header1" class="accordion-header" >
            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapse1" aria-expanded="true" aria-controls="collapse1">
              Black Cat Plush
            </button>
          </h4>

          <div id="collapse1" class="accordion-collapse collapse show" aria-labelledby="heading1" data-bs-parent="#accordion_products">
            <div class="accordion-body">
              <img src="images/product1.webp" class="img-fluid float-start me-5">
              <p>A black cat shaped like a mochi. It is hard to tell what it is thinking. Comes in multiple sizes.</p>
            </div>
          </div>

        </div>

        <!-- Panel Item 2-->
        <div class="accordion-item">

          <h4 id="header2" class="accordion-header" >
            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapse2" aria-expanded="true" aria-controls="collapse2">
              Calico Cat Plush
            </button>
          </h4>

          <div id="collapse2" class="accordion-collapse collapse" aria-labelledby="heading2" data-bs-parent="#accordion_products">
            <div class="accordion-body">
              <img src="images/product2.webp" class="img-fluid float-start me-5">
              <p>A very round calico cat. Seems like a gourmet eater.</p>
            </div>
          </div>

        </div>

        <!-- Panel Item 3-->
        <div class="accordion-item">

          <h4 id="header3" class="accordion-header">
            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapse3" aria-expanded="true" aria-controls="collapse3">
              Shiba Dog Plush
            </button>
          </h4>

          <div id="collapse3" class="accordion-collapse collapse" aria-labelledby="heading1" data-bs-parent="#accordion_products">
            <div class="accordion-body">
              <img src="images/product3.webp" class="img-fluid float-start me-5">
              <p>A brown shiba dog. Has a very happy expression and a cute tail.</p>
            </div>
          </div>

        </div>

      </div>
    </div>
    
  </div>
</body>

</html>
